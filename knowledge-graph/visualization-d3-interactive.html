<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warren Buffett 知识图谱 - 交互式网络图</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1e; color: #e0e0e0; }
        #container { display: flex; width: 100%; height: 100%; }
        #cy { flex: 1; background: linear-gradient(135deg, #0a0a14 0%, #1a1a2e 100%); }
        #sidebar { width: 320px; background: rgba(0,0,0,0.8); border-left: 1px solid rgba(255,215,0,0.3); overflow-y: auto; padding: 20px; }
        .stats { padding: 15px; background: rgba(255,215,0,0.08); border: 1px solid rgba(255,215,0,0.3); border-radius: 8px; margin-bottom: 20px; }
        .stat-item { margin: 10px 0; font-size: 13px; }
        .stat-label { color: #FFD700; font-weight: 600; display: inline-block; width: 100px; }
        .stat-value { color: #e0e0e0; font-weight: bold; }
        .controls { margin: 20px 0; }
        button { background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.4); color: #FFD700; padding: 8px 12px; border-radius: 4px; cursor: pointer; margin-right: 5px; font-size: 12px; transition: all 0.2s; }
        button:hover { background: rgba(255,215,0,0.25); border-color: rgba(255,215,0,0.6); }
        h2 { color: #FFD700; margin-bottom: 20px; font-size: 18px; }
        .legend { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,215,0,0.2); }
        .legend-item { margin: 8px 0; font-size: 12px; }
        .legend-color { display: inline-block; width: 16px; height: 16px; border-radius: 50%; margin-right: 8px; vertical-align: middle; border: 2px solid #fff; box-shadow: 0 0 8px rgba(255,215,0,0.4); }
        .info { font-size: 12px; color: #aaa; margin-top: 10px; line-height: 1.6; }
    </style>
</head>
<body>
    <div id="container">
        <div id="cy"></div>
        <div id="sidebar">
            <h2>Warren Buffett KG</h2>
            <div class="stats">
                <div class="stat-item"><span class="stat-label">节点数:</span> <span class="stat-value">12</span></div>
                <div class="stat-item"><span class="stat-label">关系数:</span> <span class="stat-value">12</span></div>
                <div class="stat-item"><span class="stat-label">网络密度:</span> <span class="stat-value">0.1818</span></div>
                <div class="stat-item"><span class="stat-label">平均度数:</span> <span class="stat-value">2.00</span></div>
            </div>
            <div class="controls">
                <button onclick="fitView()">🔄 重置视图</button>
                <button onclick="randomLayout()">🔀 重新排列</button>
            </div>
            <div class="legend">
                <div style="color: #FFD700; font-weight: 600; margin-bottom: 12px;">节点类型</div>
                <div class="legend-item"><span class="legend-color" style="background: #FF6B6B;"></span>Core (核心)</div>
                <div class="legend-item"><span class="legend-color" style="background: #4ECDC4;"></span>Important (重要)</div>
                <div class="legend-item"><span class="legend-color" style="background: #95E1D3;"></span>Reference (参考)</div>
            </div>
            <div class="info">
                <p><strong>💡 交互提示：</strong></p>
                <p>• 拖拽节点移动</p>
                <p>• 滚轮缩放</p>
                <p>• 点击节点高亮</p>
                <p>• 右键拖拽平移</p>
            </div>
        </div>
    </div>

    <script>
        const elements = [{"data": {"id": "ray_dalio", "label": "Ray Dalio", "importance": "core"}}, {"data": {"id": "principles", "label": "Principles-Based Thinking", "importance": "core"}}, {"data": {"id": "systems_thinking", "label": "Systems Thinking", "importance": "core"}}, {"data": {"id": "radical_transparency", "label": "Radical Transparency", "importance": "core"}}, {"data": {"id": "meritocracy", "label": "Idea Meritocracy", "importance": "core"}}, {"data": {"id": "bridgewater", "label": "Bridgewater Associates", "importance": "core"}}, {"data": {"id": "macro_investing", "label": "Macro Investing", "importance": "important"}}, {"data": {"id": "diversification", "label": "Portfolio Diversification", "importance": "important"}}, {"data": {"id": "all_weather", "label": "All-Weather Portfolio", "importance": "important"}}, {"data": {"id": "principles_book", "label": "Principles (Book)", "importance": "important"}}, {"data": {"id": "evolution", "label": "Evolutionary Thinking", "importance": "important"}}, {"data": {"id": "adaptation", "label": "Adaptive Systems", "importance": "important"}}, {"data": {"source": "ray_dalio", "target": "principles", "weight": 0.96, "importance": "core"}}, {"data": {"source": "ray_dalio", "target": "systems_thinking", "weight": 0.94, "importance": "core"}}, {"data": {"source": "principles", "target": "radical_transparency", "weight": 0.9, "importance": "core"}}, {"data": {"source": "systems_thinking", "target": "meritocracy", "weight": 0.88, "importance": "core"}}, {"data": {"source": "ray_dalio", "target": "bridgewater", "weight": 0.98, "importance": "core"}}, {"data": {"source": "bridgewater", "target": "macro_investing", "weight": 0.92, "importance": "important"}}, {"data": {"source": "macro_investing", "target": "diversification", "weight": 0.85, "importance": "important"}}, {"data": {"source": "diversification", "target": "all_weather", "weight": 0.88, "importance": "important"}}, {"data": {"source": "principles", "target": "evolution", "weight": 0.82, "importance": "important"}}, {"data": {"source": "evolution", "target": "adaptation", "weight": 0.8, "importance": "important"}}, {"data": {"source": "ray_dalio", "target": "principles_book", "weight": 0.9, "importance": "important"}}, {"data": {"source": "meritocracy", "target": "radical_transparency", "weight": 0.85, "importance": "important"}}];

        const cy = cytoscape({
            container: document.getElementById('cy'),
            elements: elements,
            style: [
                {
                    selector: 'node',
                    style: {
                        'background-color': function(ele) {
                            const importance = ele.data('importance');
                            if (importance === 'core') return '#FF6B6B';      // 亮红色
                            if (importance === 'important') return '#4ECDC4'; // 青绿色
                            return '#95E1D3';                                 // 浅绿色
                        },
                        'label': 'data(label)',
                        'text-valign': 'center',
                        'text-halign': 'center',
                        'font-size': function(ele) {
                            return ele.data('importance') === 'core' ? 14 : 12;
                        },
                        'color': '#000',
                        'font-weight': 'bold',
                        'width': function(ele) {
                            if (ele.data('importance') === 'core') return 55;
                            if (ele.data('importance') === 'important') return 45;
                            return 35;
                        },
                        'height': function(ele) {
                            if (ele.data('importance') === 'core') return 55;
                            if (ele.data('importance') === 'important') return 45;
                            return 35;
                        },
                        'border-width': 2,
                        'border-color': '#fff',
                        'box-shadow': function(ele) {
                            const importance = ele.data('importance');
                            if (importance === 'core') return '0 0 15px rgba(255, 107, 107, 0.8)';
                            if (importance === 'important') return '0 0 12px rgba(78, 205, 196, 0.6)';
                            return '0 0 10px rgba(149, 225, 211, 0.4)';
                        }
                    }
                },
                {
                    selector: 'edge',
                    style: {
                        'line-color': function(ele) {
                            const importance = ele.data('importance');
                            if (importance === 'core') return 'rgba(255, 107, 107, 0.5)';
                            if (importance === 'important') return 'rgba(78, 205, 196, 0.4)';
                            return 'rgba(149, 225, 211, 0.25)';
                        },
                        'width': function(ele) {
                            const weight = ele.data('weight') || 0.5;
                            return Math.max(1.5, weight * 3);
                        },
                        'curve-style': 'bezier'
                    }
                },
                {
                    selector: 'node:selected',
                    style: {
                        'background-color': '#FFD700',
                        'border-color': '#fff',
                        'border-width': 3,
                        'box-shadow': '0 0 20px rgba(255, 215, 0, 1)'
                    }
                },
                {
                    selector: 'edge:selected',
                    style: {
                        'line-color': '#FFD700',
                        'width': 3
                    }
                }
            ],
            layout: {
                name: 'cose',
                directed: false,
                roots: '#warren_buffett',
                padding: 50,
                componentSpacing: 100,
                nodeSpacing: 50,
                animate: true,
                animationDuration: 500,
                randomize: false,
                refresh: 20,
                fit: true,
                maxIterations: 1000,
                minTemp: 1.0,
                maxTemp: 10.0
            }
        });

        function fitView() {
            cy.fit(cy.elements(), 50);
        }

        function randomLayout() {
            cy.layout({
                name: 'random',
                animate: true,
                animationDuration: 500
            }).run();
        }

        window.fitView = fitView;
        window.randomLayout = randomLayout;

        // 自动适应视图
        setTimeout(() => {
            cy.fit(cy.elements(), 50);
        }, 500);
    </script>
</body>
</html>
